services:
  - type: web
    name: aerolive
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        placeholder: "Enter your MongoDB Atlas Connection String (optional fallback to mock)"
      - key: CLIENT_URL
        placeholder: "Enter your Render Service URL (e.g., https://aerolive.onrender.com or leave blank)"
      - key: AVIATIONSTACK_API_KEY
        placeholder: "Enter your AviationStack API Key"
      - key: PORT
        value: 10000
