services:
  - type: web
    name: aerolive
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: AVIATIONSTACK_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENSKY_USERNAME
        sync: false
      - key: OPENSKY_PASSWORD
        sync: false
      - key: PORT
        value: 10000
